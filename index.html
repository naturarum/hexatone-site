<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexatone has moved</title>
    <meta name="description" content="Hexatone has a new home. Redirecting you there now.">

    <!-- Permanent move: instant client-side redirect + canonical so search engines follow. -->
    <link rel="canonical" href="https://naturarum.github.io/apps/hexatone/">
    <meta http-equiv="refresh" content="0; url=https://naturarum.github.io/apps/hexatone/">

    <link rel="icon" type="image/png" href="img/icon.png">
    <link rel="apple-touch-icon" href="img/icon.png">
    <meta name="theme-color" content="#0d0d11">

    <style>
        :root {
            --bg: #0d0d11;
            --bg-card: #14141a;
            --text: #e4e4e8;
            --text-muted: #a0a0ae;
            --accent: #ffa9c9;
            --accent-glow: rgba(255, 169, 201, 0.22);
            --border: #22222b;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }
        main {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 40px 32px;
            max-width: 420px;
            width: 100%;
        }
        img.icon {
            width: 72px;
            height: 72px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 12px; }
        p { color: var(--text-muted); line-height: 1.55; margin-bottom: 24px; }
        a.btn {
            display: inline-block;
            background: var(--accent);
            color: #1a1014;
            font-weight: 600;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 10px;
            box-shadow: 0 0 24px var(--accent-glow);
        }
        a.btn:hover { filter: brightness(1.05); }
    </style>
</head>
<body>
    <main>
        <img class="icon" src="img/icon.png" alt="Hexatone icon">
        <h1>Hexatone has moved</h1>
        <p>The site has a new home. You should be redirected automatically. If nothing happens, use the link below.</p>
        <p><a class="btn" id="go" href="https://naturarum.github.io/apps/hexatone/">Continue to Hexatone</a></p>
    </main>
    <script>
        window.location.replace("https://naturarum.github.io/apps/hexatone/");
    </script>
</body>
</html>
